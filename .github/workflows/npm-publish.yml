name: Release & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则使用 package.json 中的版本)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # ============================================
  # 构建与测试
  # ============================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npx tsc -p tsconfig.github.json --noEmit

      - name: 🧪 Run tests
        run: npm test
        continue-on-error: true

      - name: 🔨 Build
        run: npm run build:ci

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lib-output
          path: lib/
          retention-days: 7


  # ============================================
  # 创建 GitHub Release
  # ============================================
  release:
    name: 🚀 Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: lib-output
          path: lib/

      - name: 🏷️ Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: 📝 Update package.json version
        if: github.event.inputs.version != ''
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: 📝 Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag（排除当前 tag）
          CURRENT_TAG="${{ steps.version.outputs.tag_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1 || echo "")

          echo "## 📦 版本 v${{ steps.version.outputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "发布时间: $(date +'%Y-%m-%d %H:%M:%S UTC')" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "### 📋 更新内容 (自 $PREV_TAG 以来)" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            echo "#### ✨ 新功能 (feat)" >> CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (\`%h\`) - %an" --grep="^feat" | head -50 >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md

            echo "#### 🐛 修复 (fix)" >> CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (\`%h\`) - %an" --grep="^fix" | head -50 >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md

            echo "#### 📚 文档 (docs)" >> CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (\`%h\`) - %an" --grep="^docs" | head -50 >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md

            echo "#### 🔧 其他更改" >> CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (\`%h\`) - %an" --invert-grep --grep="^feat" --grep="^fix" --grep="^docs" | head -50 >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md

            echo "---" >> CHANGELOG.md
            echo "### 📊 统计" >> CHANGELOG.md
            COMMIT_COUNT=$(git rev-list --count $PREV_TAG..HEAD)
            CONTRIBUTORS=$(git log $PREV_TAG..HEAD --pretty=format:"%an" | sort -u | tr '\n' ', ' | sed 's/,$//')
            echo "- 提交数: $COMMIT_COUNT" >> CHANGELOG.md
            echo "- 贡献者: $CONTRIBUTORS" >> CHANGELOG.md
          else
            echo "### 📋 所有提交" >> CHANGELOG.md
            git log --pretty=format:"- %s (\`%h\`) - %an" | head -100 >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "### 📥 安装" >> CHANGELOG.md
          echo '```bash' >> CHANGELOG.md
          echo "npm ci koishi-plugin-github-webhook-pusher@${{ steps.version.outputs.version }}" >> CHANGELOG.md
          echo '```' >> CHANGELOG.md

      - name: 📦 Create release package
        run: |
          mkdir -p release-package
          cp -r lib release-package/
          cp package.json release-package/
          cp readme.md release-package/ 2>/dev/null || true
          cp LICENSE release-package/ 2>/dev/null || true

          cd release-package
          tar -czvf ../koishi-plugin-github-webhook-pusher-v${{ steps.version.outputs.version }}.tar.gz .
          cd ..
          zip -r koishi-plugin-github-webhook-pusher-v${{ steps.version.outputs.version }}.zip release-package/

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.tag_name }}"

          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG_NAME" \
            koishi-plugin-github-webhook-pusher-v${VERSION}.tar.gz \
            koishi-plugin-github-webhook-pusher-v${VERSION}.zip \
            --title "🎉 v${VERSION}" \
            --notes-file CHANGELOG.md \
            $PRERELEASE_FLAG

  # ============================================
  # 发布到 npm
  # ============================================
  publish-npm:
    name: 📤 Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || needs.release.outputs.tag_name }}

      - name: 📥 Pull latest changes
        if: github.event_name == 'workflow_dispatch'
        run: git pull origin HEAD || true

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: lib-output
          path: lib/

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: 📥 Install dependencies
        run: npm ci --ignore-scripts

      - name: 📤 Publish to npm
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            npm publish --tag next
          else
            npm publish
          fi

      - name: ✅ Publish success
        run: |
          echo "🎉 Published koishi-plugin-github-webhook-pusher@${{ needs.release.outputs.version }}"
          echo "📦 https://www.npmjs.com/package/koishi-plugin-github-webhook-pusher"
